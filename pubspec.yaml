name: spectrogram
description: Live adaptive spectrogram for Android and Linux — microphone STFT with crosshair readout.
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  record: ^7.1.1
  fftea: ^1.5.0+1
  shared_preferences: ^2.5.3
  path_provider: ^2.1.5
  path: ^1.9.1
  file_picker: ^10.1.9

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
