name: Android Release

# Publish arm64 APK + Obtainium version.json on every main push (Flowlog-style).
# Tag pushes (v*) also create a named GitHub Release.
on:
  push:
    branches: [main]
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: android-pages
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Accept Android SDK licenses
        run: yes | flutter doctor --android-licenses || true

      - name: Install dependencies
        run: flutter pub get

      - name: Configure release signing (optional)
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        run: |
          if [ -n "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > android/app/release.keystore
            KEY_PASS="${ANDROID_KEY_PASSWORD:-$ANDROID_KEYSTORE_PASSWORD}"
            cat > android/key.properties <<EOF
          storePassword=${ANDROID_KEYSTORE_PASSWORD}
          keyPassword=${KEY_PASS}
          keyAlias=${ANDROID_KEY_ALIAS}
          storeFile=release.keystore
          EOF
            echo "Signing configured."
          else
            echo "No keystore secrets — building with debug signing."
          fi

      - name: Test
        run: flutter test

      - name: Resolve version
        id: ver
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
            VERSION_CODE=$(grep '^version:' pubspec.yaml | awk '{print $2}' | cut -d+ -f2)
            # Prefer run_number so Obtainium always sees a monotonic code on rebuilds.
            if [ -z "$VERSION_CODE" ] || [ "$VERSION_CODE" = "1" ]; then
              VERSION_CODE="${{ github.run_number }}"
            fi
          else
            VERSION="build-${{ github.run_number }}"
            VERSION_CODE="${{ github.run_number }}"
          fi
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "VERSION_CODE=$VERSION_CODE" >> "$GITHUB_ENV"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "version_code=$VERSION_CODE" >> "$GITHUB_OUTPUT"
          echo "Using version=$VERSION versionCode=$VERSION_CODE"

      - name: Build release APK (arm64)
        run: |
          flutter build apk --release --target-platform android-arm64 \
            --build-name="$VERSION" \
            --build-number="$VERSION_CODE"

      - name: Prepare release assets
        run: |
          APK=build/app/outputs/flutter-apk/app-release.apk
          cp "$APK" "spectrogram-${VERSION}-arm64-v8a.apk"
          cp "$APK" spectrogram-arm64-v8a.apk
          ls -lh spectrogram-*.apk

      - name: Publish GitHub Release (tags)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            spectrogram-*-arm64-v8a.apk
            spectrogram-arm64-v8a.apk
          generate_release_notes: true
          body: |
            **Obtainium (recommended):** add this Standard JSON URL:
            ```
            https://raw.githubusercontent.com/isyourbrainfoss/spectrogram/gh-pages/version.json
            ```

      - name: Publish GitHub Release (main builds)
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: Build ${{ github.run_number }}
          body: |
            Automated Android build for commit ${{ github.sha }}.

            **Obtainium (recommended):** Direct APK Link → Standard JSON:
            ```
            https://raw.githubusercontent.com/isyourbrainfoss/spectrogram/gh-pages/version.json
            ```

            **Linux Flatpak:**
            ```
            flatpak remote-add --if-not-exists --user spectrogram \
              https://isyourbrainfoss.github.io/spectrogram/spectrogram.flatpakrepo
            flatpak install --user spectrogram com.isyourbrainfoss.Spectrogram
            ```
          files: |
            spectrogram-arm64-v8a.apk
            spectrogram-${{ env.VERSION }}-arm64-v8a.apk
          fail_on_unmatched_files: false

      - name: Prepare GitHub Pages site (Obtainium mirror)
        run: bash tool/prepare_pages_site.sh spectrogram-arm64-v8a.apk "$VERSION" "$VERSION_CODE" site

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site
          publish_branch: gh-pages
          # Preserve Flatpak ostree repo under /repo from linux-flatpak-release.
          keep_files: true
          enable_jekyll: false
